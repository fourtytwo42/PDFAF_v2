openapi: 3.1.0
info:
  title: PDFAF v2 — PDF Accessibility API
  version: 2.0.0
  description: |
    Grade and remediate PDFs for WCAG 2.1 AA / ADA Title II-style accessibility checks.
    Multipart field `file` is required for analyze and remediate. Optional `options` on remediate is a JSON string.
  contact:
    name: PDFAF v2

servers:
  - url: http://localhost:6200
    description: Local development

paths:
  /v1/analyze:
    post:
      summary: Grade a PDF
      operationId: analyzePdf
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Analysis result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalysisResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'
        '504':
          $ref: '#/components/responses/GatewayTimeout'

  /v1/remediate:
    post:
      summary: Remediate a PDF
      operationId: remediatePdf
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                options:
                  type: string
                  description: |
                    JSON object (strict). Fields include semantic, semanticHeadings, targetScore, maxRounds,
                    htmlReport, htmlReportIncludeBeforeAfter, htmlReportIncludeFindingsDetail, htmlReportIncludeAppliedTools, etc.
                  example: '{"targetScore":90,"maxRounds":3,"htmlReport":true}'
      responses:
        '200':
          description: Remediation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RemediationResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'
        '504':
          $ref: '#/components/responses/GatewayTimeout'

  /v1/health:
    get:
      summary: Health and dependency status
      operationId: health
      responses:
        '200':
          description: OK or degraded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: Service down (e.g. database unavailable)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /v1/playbooks:
    get:
      summary: List learned playbooks and tool reliability
      operationId: listPlaybooks
      responses:
        '200':
          description: Catalog
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaybooksCatalogResponse'
        '500':
          $ref: '#/components/responses/InternalError'

components:
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    PayloadTooLarge:
      description: Uploaded file too large
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    TooManyRequests:
      description: Rate limit or server capacity
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalError:
      description: Server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    GatewayTimeout:
      description: Request timed out
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ErrorResponse:
      type: object
      required: [error, code]
      properties:
        error:
          type: string
        code:
          type: string
          examples: [BAD_REQUEST, INTERNAL_ERROR, TOO_MANY_REQUESTS]
        requestId:
          type: string
        details: {}

    AnalysisResult:
      type: object
      description: Full graded analysis with additive verification/evidence metadata.
      additionalProperties: true
      properties:
        id:
          type: string
        timestamp:
          type: string
          format: date-time
        filename:
          type: string
        pageCount:
          type: integer
        pdfClass:
          type: string
        score:
          type: number
        grade:
          type: string
        analysisDurationMs:
          type: number
        verificationLevel:
          $ref: '#/components/schemas/VerificationLevel'
        manualReviewRequired:
          type: boolean
        manualReviewReasons:
          type: array
          items:
            type: string
        scoreCapsApplied:
          type: array
          items:
            $ref: '#/components/schemas/ScoreCapApplied'
        structuralClassification:
          $ref: '#/components/schemas/StructuralClassification'
        failureProfile:
          $ref: '#/components/schemas/FailureProfile'
        categories:
          type: array
          items:
            $ref: '#/components/schemas/ScoredCategory'
        findings:
          type: array
          items:
            $ref: '#/components/schemas/Finding'

    RemediationResult:
      type: object
      description: Remediation outcome (see TypeScript `RemediationResult`).
      additionalProperties: true
      properties:
        before:
          $ref: '#/components/schemas/AnalysisResult'
        after:
          $ref: '#/components/schemas/AnalysisResult'
        remediatedPdfBase64:
          type: [string, 'null']
        remediatedPdfTooLarge:
          type: boolean
        remediationDurationMs:
          type: number
        improved:
          type: boolean
        htmlReport:
          type: [string, 'null']
          description: Present when options.htmlReport was true; null if report exceeded size cap.

    VerificationLevel:
      type: string
      enum: [verified, mixed, heuristic, manual_review_required]

    EvidenceLevel:
      type: string
      enum: [verified, heuristic, inferred_after_fix, manual_review_required]

    ScoreCapApplied:
      type: object
      additionalProperties: true
      properties:
        category:
          type: string
        cap:
          type: number
        rawScore:
          type: number
        finalScore:
          type: number
        reason:
          type: string

    StructuralClassification:
      type: object
      additionalProperties: true
      properties:
        structureClass:
          type: string
          enum: [scanned, untagged_digital, partially_tagged, native_tagged, well_tagged]
        contentProfile:
          type: object
          additionalProperties: true
          properties:
            pageBucket:
              type: string
              enum: ['1-5', '6-20', '21-50', '50+']
            dominantContent:
              type: string
              enum: [text, mixed, image_heavy]
            hasStructureTree:
              type: boolean
            hasBookmarks:
              type: boolean
            hasFigures:
              type: boolean
            hasTables:
              type: boolean
            hasForms:
              type: boolean
            annotationRisk:
              type: boolean
            taggedContentRisk:
              type: boolean
            listStructureRisk:
              type: boolean
        fontRiskProfile:
          type: object
          additionalProperties: true
          properties:
            riskLevel:
              type: string
              enum: [low, medium, high]
            riskyFontCount:
              type: integer
            missingUnicodeFontCount:
              type: integer
            unembeddedFontCount:
              type: integer
            ocrTextLayerSuspected:
              type: boolean
        confidence:
          type: string
          enum: [high, medium, low]

    FailureProfile:
      type: object
      additionalProperties: true
      properties:
        deterministicIssues:
          type: array
          items:
            type: string
        semanticIssues:
          type: array
          items:
            type: string
        manualOnlyIssues:
          type: array
          items:
            type: string
        primaryFailureFamily:
          type: string
          enum:
            [font_extractability_heavy, structure_reading_order_heavy, figure_alt_ownership_heavy, metadata_language_heavy, mixed_structural, near_pass_residual]
        secondaryFailureFamilies:
          type: array
          items:
            type: string
            enum:
              [font_extractability_heavy, structure_reading_order_heavy, figure_alt_ownership_heavy, metadata_language_heavy, mixed_structural, near_pass_residual]
        routingHints:
          type: array
          items:
            type: string
            enum:
              [prefer_structure_bootstrap, prefer_annotation_normalization, prefer_font_repair, semantic_not_primary, manual_review_likely_after_fix]

    Finding:
      type: object
      additionalProperties: true
      properties:
        category:
          type: string
        severity:
          type: string
        wcag:
          type: string
        message:
          type: string
        count:
          type: integer
        page:
          type: integer
        evidence:
          $ref: '#/components/schemas/EvidenceLevel'
        manualReviewRequired:
          type: boolean
        manualReviewReason:
          type: string

    ScoredCategory:
      type: object
      additionalProperties: true
      properties:
        key:
          type: string
        score:
          type: number
        weight:
          type: number
        applicable:
          type: boolean
        severity:
          type: string
        evidence:
          $ref: '#/components/schemas/EvidenceLevel'
        verificationLevel:
          $ref: '#/components/schemas/VerificationLevel'
        manualReviewRequired:
          type: boolean
        manualReviewReasons:
          type: array
          items:
            type: string
        scoreCapsApplied:
          type: array
          items:
            $ref: '#/components/schemas/ScoreCapApplied'
        findings:
          type: array
          items:
            $ref: '#/components/schemas/Finding'

    HealthResponse:
      type: object
      additionalProperties: true

    PlaybooksCatalogResponse:
      type: object
      required: [playbooks, toolReliability]
      properties:
        playbooks:
          type: array
          items:
            type: object
            additionalProperties: true
        toolReliability:
          type: array
          items:
            type: object
            additionalProperties: true
