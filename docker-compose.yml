# Single-container PDFAF deployment: the `pdfaf` image contains the API plus embedded `llama-server`
# and bakes the default GGUF + multimodal projector at image build time (no first-boot HF download).
# Rebuild to change weights: `docker compose build --no-cache`.
#
# Data disk: keep Docker Engine data-root on the large volume (e.g. /etc/docker/daemon.json:
#   { "data-root": "/mnt/docker-data/docker" }
# so image layers and daemon state are not on a small OS LV). For BuildKit/client temp during builds,
# use ./scripts/setup-docker-datadisk-workdir.sh once, then ./scripts/docker-compose-pdfaf.sh … or ./scripts/docker-smoke.sh
# (both set DOCKER_TMPDIR under PDFAF_DOCKER_WORK_ROOT, default /mnt/docker-data/pdfaf-docker-work).
# Large image exports still use /var/lib/containerd (ingest/tmpmounts). If / fills during `build llm`, run once:
#   sudo ./scripts/move-containerd-root-to-datadisk.sh
# Smoke test (build + curl): ./scripts/docker-smoke.sh
#
# If `sudo docker compose` says "unknown command: docker compose", root has no Compose v2 plugin.
# Prefer: add your user to the `docker` group, re-login, then run `docker compose …` without sudo.
# Or install the plugin for root once (after installing it under your user, see GitHub compose releases):
#   sudo mkdir -p /root/.docker/cli-plugins
#   sudo cp "$HOME/.docker/cli-plugins/docker-compose" /root/.docker/cli-plugins/docker-compose
#   sudo chmod +x /root/.docker/cli-plugins/docker-compose
#
# Local native dev still exists: set `PDFAF_RUN_LOCAL_LLM=1` to let the API spawn `llama-server`.

services:
  pdf-af-web:
    build:
      context: .
      dockerfile: docker/pdf-af-web.Dockerfile
    image: pdf-af-web:local
    ports:
      - '3100:3100'
    environment:
      PDFAF_API_BASE_URL: http://pdfaf:6200
      PDF_AF_STORAGE_DIR: /data
      PDF_AF_RETENTION_HOURS: '24'
      PDF_AF_PER_USER_QUOTA_BYTES: '1073741824'
    volumes:
      - pdf-af-web-data:/data
    depends_on:
      pdfaf:
        condition: service_healthy
    restart: unless-stopped

  pdfaf:
    build:
      context: .
      args:
        HF_REPO: ${GEMMA4_HF_REPO:-unsloth/gemma-4-E2B-it-GGUF}
        GGUF_FILE: ${GEMMA4_GGUF_FILE:-gemma-4-E2B-it-Q4_K_M.gguf}
        MMPROJ_FILE: ${GEMMA4_MMPROJ_FILE:-mmproj-F16.gguf}
    image: pdfaf-v2:local
    ports:
      - '127.0.0.1:6200:6200'
    environment:
      PORT: '6200'
      DB_PATH: /data/pdfaf.db
      TMPDIR: /data/tmp
      PDFAF_REMEDIATE_DEFAULT_SEMANTIC: '1'
      PDFAF_REMEDIATE_DEFAULT_SEMANTIC_HEADINGS: '1'
      PDFAF_RUN_LOCAL_LLM: '1'
      LLAMA_SERVER_BIN: /opt/llama/llama-server
      PDFAF_LLAMA_WORKDIR: /app/data/llama-work
      # PDFAF_REMEDIATE_DEFAULT_SEMANTIC_PROMOTE: '0'
      # PDFAF_REMEDIATE_DEFAULT_SEMANTIC_UNTAGGED: '0'
    volumes:
      - pdfaf-data:/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-sf', 'http://127.0.0.1:6200/v1/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

volumes:
  pdf-af-web-data:
  pdfaf-data:
